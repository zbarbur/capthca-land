# ============================================================================
# CAPTHCA land — Production Deploy Pipeline
# Trigger: Manual (run from Console or CLI when ready to deploy)
# Deploys the latest image from Artifact Registry to Cloud Run.
#
# Usage (CLI):
#   gcloud builds submit --no-source \
#     --config=cloudbuild-deploy.yaml \
#     --region=us-central1 \
#     --substitutions=_TAG=latest
#
# Staging auto-deploys via cloudbuild.yaml on every push to main.
# ============================================================================

substitutions:
  _REGION: "us-central1"
  _SERVICE_NAME: "capthca-land-prod"
  _ARTIFACT_REPO: "capthca-land"
  _IMAGE_NAME: "capthca-land"
  _TAG: "latest"
  _TURNSTILE_SITE_KEY: "0x4AAAAAACl986ntf-pNkY_a"

steps:
  # ── Step 1: Deploy to Cloud Run (Blue/Green) ──────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "deploy"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        EXTRA_FLAGS=""
        if gcloud run services describe ${_SERVICE_NAME} --region=${_REGION} --format="value(status.url)" 2>/dev/null; then
          EXTRA_FLAGS="--no-traffic"
        fi
        gcloud run deploy ${_SERVICE_NAME} \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:${_TAG} \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --min-instances=0 \
          --max-instances=10 \
          --cpu=1 \
          --memory=512Mi \
          --timeout=300 \
          --concurrency=80 \
          --port=8080 \
          --set-env-vars="GOOGLE_CLOUD_PROJECT=${PROJECT_ID},NEXT_PUBLIC_TURNSTILE_SITE_KEY=${_TURNSTILE_SITE_KEY}" \
          --set-secrets="TURNSTILE_SECRET_KEY=turnstile-secret-key:latest" \
          $$EXTRA_FLAGS

  # ── Step 2: Route Traffic to New Revision ─────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "route-traffic"
    entrypoint: "gcloud"
    args:
      - "run"
      - "services"
      - "update-traffic"
      - "${_SERVICE_NAME}"
      - "--to-latest"
      - "--region=${_REGION}"
    waitFor: ["deploy"]

options:
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true

timeout: "300s"
